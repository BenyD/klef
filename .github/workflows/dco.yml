name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Read-only: the job only inspects commit messages.
permissions:
  contents: read

jobs:
  dco:
    name: Check sign-off
    # Dependabot's generated commits carry no Signed-off-by; the DCO exists to
    # cover human contributions, so exempt the bot.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every PR commit
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          fail=0
          for sha in $(git rev-list "$base".."$head"); do
            subject=$(git log -1 --format='%s' "$sha")
            if ! git log -1 --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha (\"$subject\") is missing a Signed-off-by line. Run: git commit -s (or 'git rebase --signoff main' to fix existing commits)."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more commits are missing a DCO sign-off. See CONTRIBUTING.md."
            exit 1
          fi
          echo "All PR commits are signed off."
