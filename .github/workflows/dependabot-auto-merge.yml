name: Dependabot auto-merge

on: pull_request

# Arming auto-merge on the PR needs write; nothing else is touched.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Arm auto-merge
    # Only Dependabot's own PRs, and only in this repo (not forks).
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'BenyD/Klef'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Patch/minor bumps merge themselves once required checks pass; majors
      # wait for human review. For grouped PRs, update-type is the largest
      # bump in the group, so one major in the batch blocks auto-merge.
      - name: Enable auto-merge for patch/minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
