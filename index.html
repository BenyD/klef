    <script type="application/ld+json">
      {

      }
    </script>
    <!-- Set the theme before first paint to avoid a light flash (FOUC). Must
         run synchronously in <head>, ahead of the app bundle. Mirrors the
         next-themes config in main.tsx (attribute="class", storageKey="theme",
         defaultTheme="system"). Setting color-scheme also gives the browser a
         dark default canvas before CSS loads. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          if (dark) root.classList.add("dark");
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/web/main.tsx"></script>
  </body>
